<div class="p-6 h-full flex flex-col bg-white">
    <form id="email-compose-form" hx-post="{% url 'mail_hub:ajax_mail_send' %}">
        {% csrf_token %}<input type="hidden" name="account_id" value="{{ current_account.id }}">
        <div class="space-y-4 mb-4">
            <input type="text" name="to" placeholder="An" class="w-full border-b border-slate-200 py-2 focus:outline-none focus:border-amber-500">
            <input type="text" name="subject" placeholder="Betreff" class="w-full border-b border-slate-200 py-2 focus:outline-none focus:border-amber-500">
        </div>
        
        <textarea id="mail-editor" name="content">
            <br><br>
            {% if signature %}
                <div class="signature">{{ signature.content_html|safe }}</div>
            {% endif %}
        </textarea>
    </form>
</div>
