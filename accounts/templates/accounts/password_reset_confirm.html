{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-16 p-10 bg-white rounded-3xl shadow-sm border border-slate-100">
    <h2 class="font-serif text-2xl mb-6">Neues Passwort wählen</h2>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-xs uppercase tracking-widest text-slate-400 font-semibold mb-2">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-sage-200 outline-none">
                {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 transition">Passwort speichern</button>
    </form>
</div>
{% endblock %}
