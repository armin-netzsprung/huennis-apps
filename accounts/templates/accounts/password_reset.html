{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto my-16 p-8 bg-white shadow-2xl rounded-3xl border border-slate-100">
    <h2 class="font-serif text-2xl mb-4 text-slate-800">Passwort vergessen?</h2>
    <p class="text-sm text-slate-500 mb-8">Gib deine E-Mail-Adresse ein. Wir senden dir einen Link, mit dem du ein neues Passwort erstellen kannst.</p>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-xs uppercase tracking-widest text-slate-400 font-semibold mb-2">Deine E-Mail</label>
            <input type="email" name="email" required 
                   class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-sage-200 outline-none">
        </div>
        <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 transition">
            Link anfordern
        </button>
    </form>
</div>
{% endblock %}
