{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto my-20 px-6 text-center">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-12">
        <div class="w-20 h-20 bg-amber-50 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6">
            🔑
        </div>
        <h1 class="text-3xl font-serif text-slate-800 mb-4">Verbindung fehlt</h1>
        <p class="text-slate-500 mb-8 leading-relaxed">
            Dein Benutzerkonto ist noch nicht mit dem Seafile-Speicher verknüpft. 
            Bitte hinterlege deinen <strong>Auth Token</strong> in deinen Profileinstellungen, 
            um auf deine Dokumente zuzugreifen.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'profile' %}" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-700 transition shadow-lg">
                Zum Profil gehen
            </a>
            <a href="{% url 'home' %}" class="px-8 py-3 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition">
                Später einrichten
            </a>
        </div>
    </div>
</div>
{% endblock %}
