<div id="item-row-{{ item.id }}" class="grid grid-cols-12 gap-2 sm:gap-4 p-4 items-center border-b border-slate-50 hover:bg-slate-50 transition group">
    <input type="hidden" name="item_id_order" value="{{ item.id }}">
    
    <div class="col-span-1 flex items-center justify-center cursor-grab active:cursor-grabbing drag-handle text-slate-300 hover:text-amber-500 transition">
        <i data-lucide="grip-vertical" class="w-5 h-5"></i>
    </div>
    
    <div class="col-span-1 hidden sm:block text-sm text-slate-400 font-mono">
        {{ item.position }}
    </div>
    
    <div class="col-span-3">
        <select name="article_select" 
                class="w-full text-[10px] text-amber-600 bg-amber-50 border-none rounded mb-1 focus:ring-1 focus:ring-amber-300"
                hx-post="{% url 'erp:apply_article' item.id %}" 
                hx-target="#item-row-{{ item.id }}" 
                hx-swap="outerHTML">
            <option value="" {% if not item.article %}selected{% endif %} disabled>-- Artikel wählen --</option>
            {% for art in articles %}
                <option value="{{ art.id }}" {% if item.article.id == art.id %}selected{% endif %}>
                    {{ art.article_number }} - {{ art.name }}
                </option>
            {% endfor %}
        </select>
        
        <input type="text" name="item_{{ item.id }}_title" value="{{ item.title }}" 
               class="w-full font-bold text-slate-800 text-sm border-none bg-transparent focus:ring-0 p-0"
               hx-post="{% url 'erp:save_item_field' item.id 'title' %}" hx-trigger="keyup changed delay:1s">
        
        <div class="flex items-center gap-2 mt-1">
            <input type="number" name="item_{{ item.id }}_price" step="0.01" value="{{ item.unit_price|stringformat:'f' }}"
                   class="w-20 text-[10px] text-slate-500 border border-transparent hover:border-slate-200 rounded bg-transparent focus:bg-white transition"
                   hx-post="{% url 'erp:save_item_field' item.id 'price' %}" 
                   hx-trigger="change, keyup changed delay:500ms"
                   hx-swap="none"> 
            <span class="text-[10px] text-slate-400">€ / {{ item.unit.abbreviation|default:"Stk." }}</span>
        </div>
    </div>

    <div class="col-span-1 text-center">
        <select name="item_{{ item.id }}_tax" 
                class="w-full max-w-[90px] text-[10px] border border-slate-200 rounded p-1 text-slate-600 focus:outline-none focus:border-amber-500 bg-white"
                hx-post="{% url 'erp:save_item_field' item.id 'tax' %}" 
                hx-swap="none">
            <option value="19.00" {% if item.tax_rate == 19 %}selected{% endif %}>19%</option>
            </select>
    </div>

    <div class="col-span-2 text-right">
        <input type="number" name="item_{{ item.id }}_qty" step="0.01" value="{{ item.quantity|stringformat:'f' }}" 
               class="w-16 sm:w-20 text-right border border-slate-200 rounded p-1 text-sm bg-white focus:outline-none focus:border-amber-500"
               hx-post="{% url 'erp:save_item_field' item.id 'qty' %}" 
               hx-trigger="keyup changed delay:500ms"
               hx-swap="none">
    </div>
        
    <div class="col-span-2 text-right flex items-center justify-end gap-1">
        <input type="number" name="item_{{ item.id }}_discount" value="{{ item.discount_percentage|stringformat:'f' }}" 
               class="w-12 sm:w-16 text-right border rounded p-1 text-sm bg-white border-slate-200 focus:outline-none focus:border-amber-500"
               hx-post="{% url 'erp:save_item_field' item.id 'discount' %}" 
               hx-trigger="keyup changed delay:500ms"
               hx-swap="none">
        <span class="text-xs font-bold text-slate-400">%</span>
    </div>
        
    <div class="col-span-2 text-right font-semibold text-slate-800 flex items-center justify-end gap-4">
        <span id="item-total-{{ item.id }}" class="text-sm">
            {{ item.net_total|floatformat:2 }} €
        </span>
        <button type="button" 
                hx-delete="{% url 'erp:delete_item' item.id %}" 
                hx-target="#item-list" 
                hx-swap="innerHTML"
                hx-confirm="Löschen?"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                class="text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
        </button>
    </div>
</div>
